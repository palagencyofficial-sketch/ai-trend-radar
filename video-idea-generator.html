<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Idea Generator - Pro</title>
    <meta name="description" content="Generate viral YouTube video ideas using AI">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#f97316', // Orange 500
                            600: '#ea580c', // Orange 600
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-8px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #020617;
            background-image: 
                radial-gradient(circle at 15% 0%, rgba(249, 115, 22, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 100%, rgba(225, 29, 72, 0.15) 0%, transparent 40%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(249, 115, 22, 0.3);
            box-shadow: 0 20px 40px -15px rgba(249, 115, 22, 0.2);
        }

        .glow-text {
            text-shadow: 0 0 25px rgba(249, 115, 22, 0.6);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #10b981;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s, visibility 0.3s;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body class="text-slate-200 font-sans p-4 md:p-8 flex flex-col items-center min-h-screen relative overflow-x-hidden">

    <!-- Header Section -->
    <div class="w-full max-w-4xl text-center mt-6 mb-10 z-10 relative">
        <div class="inline-flex items-center justify-center p-3.5 bg-orange-500/10 rounded-2xl mb-6 border border-orange-500/20 animate-float shadow-[0_0_30px_rgba(249,115,22,0.15)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 5 18 3-9h5"></path></svg>
        </div>
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-white tracking-tight mb-4">
            Viral Video <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-rose-500 glow-text">Ideas</span>
        </h1>
        <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto">
            Generate high-retention, highly clickable video concepts for your niche in seconds.
        </p>
    </div>

    <!-- Main Input Container -->
    <div class="w-full max-w-3xl z-10">
        <div class="bg-slate-900/50 backdrop-blur-xl border border-slate-700/60 rounded-3xl p-6 sm:p-8 mb-12 shadow-2xl relative overflow-hidden">
            <!-- Subtle background effect inside card -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-orange-500/5 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none"></div>

            <div class="flex flex-col md:flex-row gap-4 relative z-10">
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-orange-400/70" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    <input 
                        type="text" 
                        id="topic" 
                        class="block w-full pl-14 pr-4 py-4 sm:py-5 bg-slate-950/50 border border-slate-700 rounded-2xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500 transition-all text-lg shadow-inner"
                        placeholder="Enter your niche (e.g. Personal Finance, AI Tools)..."
                        autocomplete="off"
                        onkeypress="handleEnter(event)"
                    >
                </div>
                <button 
                    id="generateBtn"
                    onclick="startGeneration()" 
                    class="bg-gradient-to-r from-orange-500 to-rose-600 hover:from-orange-400 hover:to-rose-500 text-white font-bold py-4 sm:py-5 px-8 rounded-2xl shadow-[0_0_20px_rgba(249,115,22,0.3)] transition-all active:scale-[0.98] flex justify-center items-center gap-3 whitespace-nowrap md:w-auto w-full group"
                >
                    <span id="btnText">Generate Ideas</span>
                    <svg id="btnIcon" class="w-5 h-5 group-hover:translate-x-1 transition-transform" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
                    
                    <svg id="btnLoader" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden text-center py-10 animate-pulse">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="h-32 bg-slate-800/50 rounded-2xl border border-slate-700/50"></div>
                <div class="h-32 bg-slate-800/50 rounded-2xl border border-slate-700/50"></div>
                <div class="h-32 bg-slate-800/50 rounded-2xl border border-slate-700/50 hidden md:block"></div>
                <div class="h-32 bg-slate-800/50 rounded-2xl border border-slate-700/50 hidden md:block"></div>
            </div>
            <p class="text-orange-400/80 font-medium mt-6 text-sm tracking-widest uppercase">Analyzing YouTube Algorithm...</p>
        </div>

        <!-- Results Grid -->
        <div id="resultArea" class="hidden">
            <div class="flex items-center justify-between mb-6 px-2">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.8)]"></span>
                    Top Performing Formats
                </h3>
                <span class="text-sm font-medium text-slate-400 bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700">6 Ideas Generated</span>
            </div>
            
            <div id="ideasGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-6">
                <!-- Cards injected via JS -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        Idea copied to clipboard!
    </div>

<script>
    function handleEnter(e) {
        if (e.key === 'Enter') {
            startGeneration();
        }
    }

    // High-converting YouTube template structures
    const templates = [
        {
            category: "Beginner Guide",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>`,
            text: "The Ultimate {topic} Guide for Absolute Beginners (2026)",
            color: "text-blue-400",
            bg: "bg-blue-400/10"
        },
        {
            category: "Shock / Fear",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-400"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`,
            text: "Stop Doing {topic} Like This (10 Huge Mistakes)",
            color: "text-red-400",
            bg: "bg-red-400/10"
        },
        {
            category: "Challenge / Vlog",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-400"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`,
            text: "I Tried {topic} For 30 Days And This Happened...",
            color: "text-orange-400",
            bg: "bg-orange-400/10"
        },
        {
            category: "Trend / Analysis",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>`,
            text: "Why {topic} Is Completely Taking Over The Internet",
            color: "text-emerald-400",
            bg: "bg-emerald-400/10"
        },
        {
            category: "Money / Business",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-400"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>`,
            text: "How To Actually Make Money With {topic} Right Now",
            color: "text-green-400",
            bg: "bg-green-400/10"
        },
        {
            category: "Secrets / Hacks",
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-400"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`,
            text: "The Dark Truth About {topic} Nobody Wants To Tell You",
            color: "text-purple-400",
            bg: "bg-purple-400/10"
        }
    ];

    function startGeneration() {
        const inputEl = document.getElementById("topic");
        let topic = inputEl.value.trim();
        
        if (!topic) {
            topic = "Faceless Channels"; 
            inputEl.value = topic;
        }

        // Capitalize Words beautifully
        const formattedTopic = topic.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');

        const btn = document.getElementById("generateBtn");
        const btnText = document.getElementById("btnText");
        const btnIcon = document.getElementById("btnIcon");
        const btnLoader = document.getElementById("btnLoader");
        const loadingState = document.getElementById("loadingState");
        const resultArea = document.getElementById("resultArea");
        const ideasGrid = document.getElementById("ideasGrid");

        // UI Loading State
        btn.disabled = true;
        btn.classList.add("opacity-90", "cursor-wait");
        btnText.innerText = "Analyzing Trends...";
        btnIcon.classList.add("hidden");
        btnLoader.classList.remove("hidden");
        
        resultArea.classList.add("hidden");
        ideasGrid.innerHTML = ""; // Clear old
        loadingState.classList.remove("hidden");

        // Fake AI Processing Delay
        setTimeout(() => {
            
            // Generate Cards HTML
            let html = "";
            templates.forEach((tpl, index) => {
                const ideaText = tpl.text.replace(/{topic}/g, formattedTopic);
                
                html += `
                <div class="glass-card rounded-2xl p-5 flex flex-col justify-between animate-fade-in-up" style="animation-delay: ${index * 0.1}s">
                    <div class="mb-4">
                        <div class="flex items-center gap-2 mb-3">
                            <div class="p-1.5 rounded-lg ${tpl.bg}">
                                ${tpl.icon}
                            </div>
                            <span class="text-xs font-bold uppercase tracking-wider ${tpl.color}">${tpl.category}</span>
                        </div>
                        <h4 class="text-lg md:text-xl font-bold text-white leading-tight pr-4">
                            "${ideaText}"
                        </h4>
                    </div>
                    
                    <div class="pt-4 border-t border-slate-700/50 mt-auto flex justify-end">
                        <button onclick="copyIdea(this, '${ideaText.replace(/'/g, "\\'")}')" class="text-sm font-medium text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl transition-colors flex items-center gap-2 border border-slate-700 hover:border-slate-600">
                            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy Idea
                        </button>
                    </div>
                </div>
                `;
            });

            ideasGrid.innerHTML = html;
            
            // Revert Button State
            btn.disabled = false;
            btn.classList.remove("opacity-90", "cursor-wait");
            btnText.innerText = "Regenerate";
            btnIcon.classList.remove("hidden");
            btnLoader.classList.add("hidden");
            
            // Show Results
            loadingState.classList.add("hidden");
            resultArea.classList.remove("hidden");

        }, 1200);
    }

    // Function to copy text and show Toast
    function copyIdea(btnElement, text) {
        // Fallback for modern copy
        navigator.clipboard.writeText(text).then(() => {
            showToast();
            
            // Temporary button visual feedback
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = `<svg class="w-4 h-4 text-emerald-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!`;
            btnElement.classList.add('border-emerald-500/50', 'text-emerald-400');
            
            setTimeout(() => {
                btnElement.innerHTML = originalHTML;
                btnElement.classList.remove('border-emerald-500/50', 'text-emerald-400');
            }, 2000);
            
        }).catch(err => {
            console.error('Failed to copy: ', err);
            // Old fallback method if navigator fails in some iframes
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
            showToast();
        });
    }

    function showToast() {
        const toast = document.getElementById("toast");
        toast.className = "show flex items-center gap-2";
        setTimeout(() => {
            toast.className = toast.className.replace("show flex items-center gap-2", "flex items-center gap-2");
        }, 3000);
    }
</script>

</body>
</html>
