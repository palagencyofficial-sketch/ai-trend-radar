<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Thumbnail Text Generator - Pro</title>
    <meta name="description" content="Generate high-CTR, viral YouTube thumbnail texts instantly">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter for UI, Oswald for heavy thumbnail text -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        thumb: ['Oswald', 'sans-serif'], // Special font for thumbnails
                    },
                    colors: {
                        brand: {
                            500: '#f43f5e', // Rose 500
                            600: '#e11d48', // Rose 600
                        }
                    },
                    animation: {
                        'fade-in-scale': 'fadeInScale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'float': 'float 4s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInScale: {
                            '0%': { opacity: '0', transform: 'scale(0.9) translateY(10px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #020617;
            background-image: 
                radial-gradient(circle at 80% 0%, rgba(244, 63, 94, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 20% 100%, rgba(251, 191, 36, 0.1) 0%, transparent 40%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Authentic YouTube Thumbnail Text Style */
        .thumbnail-text {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            line-height: 1.1;
            text-shadow: 
                3px 3px 0 #000,
                -1px -1px 0 #000,
                1px -1px 0 #000,
                -1px 1px 0 #000,
                1px 1px 0 #000,
                0 5px 15px rgba(0,0,0,0.8);
            letter-spacing: -0.5px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #f43f5e;
            color: #fff;
            text-align: center;
            border-radius: 9999px;
            padding: 12px 24px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%) translateY(20px);
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 25px -5px rgba(244, 63, 94, 0.4);
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8 flex flex-col items-center min-h-screen relative overflow-x-hidden">

    <!-- Header Section -->
    <div class="w-full max-w-5xl text-center mt-6 mb-10 z-10 relative">
        <div class="inline-flex items-center justify-center p-4 bg-rose-500/10 rounded-2xl mb-6 border border-rose-500/20 animate-float shadow-[0_0_30px_rgba(244,63,94,0.15)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
        </div>
        <h1 class="text-4xl md:text-6xl font-extrabold text-white tracking-tight mb-4 drop-shadow-md">
            Thumbnail <span class="text-transparent bg-clip-text bg-gradient-to-r from-rose-400 to-amber-400 drop-shadow-[0_0_15px_rgba(244,63,94,0.5)]">Text Gen</span>
        </h1>
        <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto font-medium">
            Generate highly clickable, high-CTR text designed specifically for YouTube thumbnails.
        </p>
    </div>

    <!-- Input Section -->
    <div class="w-full max-w-3xl z-10">
        <div class="glass-card rounded-[2rem] p-6 sm:p-8 mb-12 shadow-2xl relative overflow-hidden">
            <div class="flex flex-col md:flex-row gap-4 relative z-10">
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                        <svg class="h-6 w-6 text-rose-400/80" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    </div>
                    <input 
                        type="text" 
                        id="topic" 
                        class="block w-full pl-14 pr-4 py-4 sm:py-5 bg-slate-900 border border-slate-700 rounded-2xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-rose-500/50 focus:border-rose-500 transition-all text-xl font-medium shadow-inner uppercase"
                        placeholder="ENTER YOUR VIDEO TOPIC..."
                        autocomplete="off"
                        onkeypress="handleEnter(event)"
                    >
                </div>
                <button 
                    id="generateBtn"
                    onclick="startGeneration()" 
                    class="bg-gradient-to-r from-rose-600 to-pink-500 hover:from-rose-500 hover:to-pink-400 text-white font-bold text-lg py-4 sm:py-5 px-8 rounded-2xl shadow-[0_0_20px_rgba(244,63,94,0.4)] transition-all active:scale-[0.97] flex justify-center items-center gap-3 whitespace-nowrap md:w-auto w-full group"
                >
                    <span id="btnText">Generate Text</span>
                    <svg id="btnIcon" class="w-6 h-6 group-hover:rotate-12 transition-transform" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                    
                    <svg id="btnLoader" class="animate-spin h-6 w-6 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Loading State (Skeleton of 16:9 thumbnails) -->
        <div id="loadingState" class="hidden text-center py-4">
            <p class="text-rose-400 font-bold mb-6 tracking-widest uppercase animate-pulse">Designing Thumbnails...</p>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="aspect-video bg-slate-800/60 rounded-2xl animate-pulse"></div>
                <div class="aspect-video bg-slate-800/60 rounded-2xl animate-pulse"></div>
                <div class="aspect-video bg-slate-800/60 rounded-2xl animate-pulse hidden md:block"></div>
                <div class="aspect-video bg-slate-800/60 rounded-2xl animate-pulse hidden lg:block"></div>
                <div class="aspect-video bg-slate-800/60 rounded-2xl animate-pulse hidden lg:block"></div>
                <div class="aspect-video bg-slate-800/60 rounded-2xl animate-pulse hidden lg:block"></div>
            </div>
        </div>

        <!-- Results Grid -->
        <div id="resultArea" class="hidden w-full max-w-6xl mx-auto">
            <div class="flex items-center justify-between mb-8 px-2 border-b border-slate-800 pb-4">
                <h3 class="text-xl md:text-2xl font-bold text-white flex items-center gap-3">
                    <span class="p-1.5 bg-rose-500/20 text-rose-400 rounded-lg">
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                    Thumbnail Previews
                </h3>
            </div>
            
            <div id="ideasGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Cards injected via JS -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>Text Copied!</span>
    </div>

<script>
    function handleEnter(e) {
        if (e.key === 'Enter') {
            startGeneration();
        }
    }

    // High-CTR Thumbnail Text Templates with color styling hints
    const templates = [
        { text: "{TOPIC} SECRET", color: "text-amber-400", style: "bg-gradient-to-br from-slate-900 to-slate-800" },
        { text: "STOP DOING THIS", color: "text-rose-500", style: "bg-gradient-to-br from-slate-900 to-red-900/30" },
        { text: "THIS IS CRAZY", color: "text-white", style: "bg-gradient-to-br from-indigo-900/40 to-slate-900" },
        { text: "{TOPIC} IN 1 CLICK", color: "text-cyan-400", style: "bg-gradient-to-br from-slate-900 to-slate-800" },
        { text: "NOBODY KNOWS THIS", color: "text-amber-400", style: "bg-gradient-to-br from-orange-900/30 to-slate-900" },
        { text: "{TOPIC} EXPOSED", color: "text-rose-500", style: "bg-gradient-to-br from-slate-900 to-slate-800" },
        { text: "BIG MISTAKE", color: "text-white", style: "bg-gradient-to-br from-red-900/40 to-slate-900" },
        { text: "GAME CHANGER", color: "text-emerald-400", style: "bg-gradient-to-br from-slate-900 to-emerald-900/20" },
        { text: "TRY THIS NOW", color: "text-white", style: "bg-gradient-to-br from-blue-900/30 to-slate-900" }
    ];

    function startGeneration() {
        const inputEl = document.getElementById("topic");
        let topic = inputEl.value.trim().toUpperCase();
        
        if (!topic) {
            topic = "AI TOOLS"; 
            inputEl.value = topic;
        } else {
            // Keep it short for thumbnails if user types a whole sentence
            let words = topic.split(' ');
            if(words.length > 2) {
                topic = words.slice(0, 2).join(' ');
            }
        }

        const btn = document.getElementById("generateBtn");
        const btnText = document.getElementById("btnText");
        const btnIcon = document.getElementById("btnIcon");
        const btnLoader = document.getElementById("btnLoader");
        const loadingState = document.getElementById("loadingState");
        const resultArea = document.getElementById("resultArea");
        const ideasGrid = document.getElementById("ideasGrid");

        // UI Loading State
        btn.disabled = true;
        btn.classList.add("opacity-90", "cursor-wait");
        btnText.innerText = "Designing...";
        btnIcon.classList.add("hidden");
        btnLoader.classList.remove("hidden");
        
        resultArea.classList.add("hidden");
        ideasGrid.innerHTML = ""; 
        loadingState.classList.remove("hidden");

        // Simulate Generation
        setTimeout(() => {
            
            let html = "";
            templates.forEach((tpl, index) => {
                const finalString = tpl.text.replace(/{TOPIC}/g, topic);
                
                // Determine text size based on length to fit the 16:9 box nicely
                let textSize = "text-4xl sm:text-5xl";
                if(finalString.length > 15) textSize = "text-3xl sm:text-4xl";
                if(finalString.length > 20) textSize = "text-2xl sm:text-3xl";

                html += `
                <div class="group relative animate-fade-in-scale" style="animation-delay: ${index * 0.05}s">
                    <!-- 16:9 Thumbnail Box -->
                    <div class="aspect-video ${tpl.style} rounded-2xl border-2 border-slate-700/50 flex flex-col items-center justify-center p-6 text-center shadow-xl overflow-hidden relative transition-all duration-300 group-hover:border-rose-500/50 group-hover:shadow-[0_0_30px_rgba(244,63,94,0.2)] group-hover:scale-[1.02]">
                        
                        <!-- Overlay gradient for depth -->
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                        
                        <!-- The Thumbnail Text -->
                        <h2 class="thumbnail-text ${textSize} ${tpl.color} relative z-10 px-2 transition-transform duration-300 group-hover:scale-105">
                            ${finalString}
                        </h2>

                        <!-- Copy Button Overlay -->
                        <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px] opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center z-20">
                            <button onclick="copyText(this, '${finalString.replace(/'/g, "\\'")}')" class="bg-rose-500 hover:bg-rose-400 text-white font-bold py-3 px-6 rounded-full flex items-center gap-2 transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 shadow-lg">
                                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                Copy Text
                            </button>
                        </div>
                    </div>
                </div>
                `;
            });

            ideasGrid.innerHTML = html;
            
            // Revert Button State
            btn.disabled = false;
            btn.classList.remove("opacity-90", "cursor-wait");
            btnText.innerText = "Regenerate";
            btnIcon.classList.remove("hidden");
            btnLoader.classList.add("hidden");
            
            // Show Results
            loadingState.classList.add("hidden");
            resultArea.classList.remove("hidden");

        }, 1200);
    }

    function copyText(btnElement, text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast();
        }).catch(err => {
            // Fallback
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
            showToast();
        });
    }

    function showToast() {
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        setTimeout(() => {
            toast.classList.remove("show");
        }, 2500);
    }
</script>

</body>
</html>
