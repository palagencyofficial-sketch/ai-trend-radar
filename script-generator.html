<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Script Generator - Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#8b5cf6', // Violet 500
                            600: '#7c3aed', // Violet 600
                        }
                    },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #020617;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #020617 70%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-200 font-sans p-4 sm:p-8 flex flex-col items-center min-h-screen">

    <!-- Background Glow Blobs -->
    <div class="fixed top-20 left-1/4 w-96 h-96 bg-violet-600/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="fixed bottom-20 right-1/4 w-96 h-96 bg-fuchsia-600/10 rounded-full blur-[100px] pointer-events-none"></div>

    <!-- Main Container -->
    <div class="w-full max-w-3xl relative z-10 mt-8 sm:mt-12">
        
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center justify-center p-3 bg-slate-800/50 rounded-2xl mb-5 border border-slate-700 animate-float shadow-[0_0_30px_rgba(139,92,246,0.2)]">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight mb-3">
                AI Script <span class="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-400 glow-text">Generator</span>
            </h1>
            <p class="text-slate-400 text-lg">Instantly craft viral video ideas, hooks, and thumbnails.</p>
        </div>

        <!-- Input Section (Glass Card) -->
        <div class="glass-card rounded-3xl p-6 sm:p-8 mb-8 shadow-2xl">
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-violet-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    </div>
                    <input 
                        type="text" 
                        id="topic" 
                        class="block w-full pl-12 pr-4 py-4 bg-slate-900/60 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-500 transition-all text-lg"
                        placeholder="Enter your video topic (e.g. AI Tools, Fitness)..."
                        autocomplete="off"
                        onkeypress="handleEnter(event)"
                    >
                </div>
                <button 
                    id="generateBtn"
                    onclick="startGeneration()" 
                    class="bg-gradient-to-r from-brand-600 to-fuchsia-600 hover:from-fuchsia-500 hover:to-brand-500 text-white font-semibold py-4 px-8 rounded-xl shadow-lg shadow-violet-900/30 transition-all active:scale-[0.98] flex justify-center items-center gap-2 whitespace-nowrap min-w-[160px]"
                >
                    <span id="btnText">Generate Script</span>
                    <svg id="btnLoader" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden text-center py-12 animate-pulse-fast">
            <div class="inline-flex items-center justify-center p-4 bg-violet-500/10 rounded-full mb-4">
                <svg class="h-8 w-8 text-violet-400 animate-[spin_3s_linear_infinite]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path></svg>
            </div>
            <p class="text-violet-300 font-medium text-lg">Brainstorming viral ideas...</p>
        </div>

        <!-- Results Area -->
        <div id="resultArea" class="hidden opacity-0 transition-opacity duration-700 flex flex-col gap-6">
            
            <!-- Target Topic Badge -->
            <div class="flex items-center gap-2 px-4 py-2 bg-slate-800/80 border border-slate-700 rounded-lg w-fit mx-auto mb-2">
                <span class="text-slate-400 text-sm">Targeting Niche:</span>
                <span id="resTopic" class="text-white font-semibold capitalize"></span>
            </div>

            <!-- Title & Hook Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Title Card -->
                <div class="glass-card rounded-2xl p-6 border-l-4 border-l-violet-500 hover:bg-slate-800/60 transition-colors">
                    <div class="flex items-center gap-2 mb-3">
                        <svg class="w-5 h-5 text-violet-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        <h3 class="text-slate-400 font-semibold text-sm uppercase tracking-wider">Viral Title Idea</h3>
                    </div>
                    <p id="resTitle" class="text-xl md:text-2xl font-bold text-white leading-tight"></p>
                </div>

                <!-- Hook Card -->
                <div class="glass-card rounded-2xl p-6 border-l-4 border-l-fuchsia-500 hover:bg-slate-800/60 transition-colors relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <svg class="w-24 h-24 text-fuchsia-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    </div>
                    <div class="flex items-center gap-2 mb-3 relative z-10">
                        <svg class="w-5 h-5 text-fuchsia-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                        <h3 class="text-slate-400 font-semibold text-sm uppercase tracking-wider">The 3-Second Hook</h3>
                    </div>
                    <p id="resHook" class="text-lg text-slate-200 relative z-10 font-medium italic">""</p>
                </div>
            </div>

            <!-- Video Flow / Outline -->
            <div class="glass-card rounded-2xl p-6 hover:bg-slate-800/60 transition-colors">
                <div class="flex items-center gap-2 mb-4">
                    <svg class="w-5 h-5 text-cyan-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    <h3 class="text-slate-400 font-semibold text-sm uppercase tracking-wider">Video Flow & Script Outline</h3>
                </div>
                <div class="space-y-3" id="resOutline">
                    <!-- Dynamic Content -->
                </div>
            </div>

            <!-- Thumbnail Concept -->
            <div class="glass-card rounded-2xl p-1 bg-gradient-to-r from-violet-600/30 to-fuchsia-600/30">
                <div class="bg-slate-900 rounded-xl p-6 h-full flex flex-col md:flex-row items-center gap-6">
                    <div class="w-full md:w-1/3 aspect-video bg-slate-800 rounded-lg border-2 border-dashed border-slate-600 flex items-center justify-center relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-tr from-violet-900/50 to-transparent"></div>
                        <h4 id="resThumbText" class="text-xl font-black text-white text-center uppercase drop-shadow-lg z-10 p-2 transform -rotate-3 group-hover:scale-110 transition-transform"></h4>
                    </div>
                    <div class="w-full md:w-2/3">
                        <h3 class="text-violet-400 font-semibold text-sm uppercase tracking-wider mb-2 flex items-center gap-2">
                            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            Thumbnail Concept
                        </h3>
                        <p id="resThumbDesc" class="text-slate-300"></p>
                    </div>
                </div>
            </div>

        </div>
    </div>

<script>
    // Templates to make generation feel more dynamic
    const templates = [
        {
            title: "5 Amazing Facts About {topic} You Never Knew",
            hook: "You won't believe what we just discovered about {topic}. Fact #3 changes everything!",
            outline: [
                "0:00 - Intro & The Big Promise about {topic}.",
                "0:30 - Explain the core basics simply.",
                "1:45 - Reveal the hidden secrets/facts.",
                "3:00 - Real-world examples of {topic} in action.",
                "4:15 - Call to Action (Subscribe for more)."
            ],
            thumbText: "{topic} SECRETS",
            thumbDesc: "A split screen showing a confused face on the left, and a glowing graphic representing {topic} on the right with an arrow pointing to it."
        },
        {
            title: "How {topic} is Changing the World in 2024",
            hook: "If you are ignoring {topic} right now, you are falling behind. Here is exactly why.",
            outline: [
                "0:00 - The shocking truth about {topic}.",
                "1:00 - How it went from zero to massive trend.",
                "2:30 - Step-by-step breakdown of how it works.",
                "4:00 - Why the future depends on {topic}.",
                "5:30 - Conclusion & Question for the audience."
            ],
            thumbText: "DON'T IGNORE THIS",
            thumbDesc: "A dark, moody background with a bright, glowing text of '{topic}' in the center and a red upward trend arrow."
        },
        {
            title: "The Ultimate Guide to {topic} for Beginners",
            hook: "Everyone is talking about {topic}, but nobody explains it simply. Until today.",
            outline: [
                "0:00 - Hook & identifying the viewer's problem.",
                "1:15 - The absolute basics of {topic} explained.",
                "3:00 - Common mistakes beginners make.",
                "5:00 - Pro tips to master it fast.",
                "6:30 - Summary & Outro."
            ],
            thumbText: "{topic} EXPLAINED",
            thumbDesc: "A clean, bright background with a 3D icon representing {topic} and big bold text pointing at it."
        }
    ];

    function handleEnter(e) {
        if (e.key === 'Enter') {
            startGeneration();
        }
    }

    function startGeneration() {
        const inputEl = document.getElementById("topic");
        let topic = inputEl.value.trim();
        
        if (!topic) {
            topic = "Artificial Intelligence"; 
            inputEl.value = topic;
        }

        const btn = document.getElementById("generateBtn");
        const btnText = document.getElementById("btnText");
        const btnLoader = document.getElementById("btnLoader");
        const loadingState = document.getElementById("loadingState");
        const resultArea = document.getElementById("resultArea");

        // UI Reset & Loading State
        btn.disabled = true;
        btn.classList.add("opacity-80", "cursor-not-allowed");
        btnText.innerText = "Generating...";
        btnLoader.classList.remove("hidden");
        
        resultArea.classList.remove("opacity-100");
        resultArea.classList.add("hidden");
        loadingState.classList.remove("hidden");

        // Simulate AI Generation Delay
        setTimeout(() => {
            populateResults(topic);
            
            // Revert Button State
            btn.disabled = false;
            btn.classList.remove("opacity-80", "cursor-not-allowed");
            btnText.innerText = "Generate Another";
            btnLoader.classList.add("hidden");
            
            // Show Results
            loadingState.classList.add("hidden");
            resultArea.classList.remove("hidden");
            
            // Allow CSS transition to fire
            setTimeout(() => {
                resultArea.classList.add("opacity-100");
            }, 50);

        }, 1800); // 1.8s delay for dramatic effect
    }

    function populateResults(topic) {
        // Pick a random template
        const tpl = templates[Math.floor(Math.random() * templates.length)];
        
        // Capitalize topic for better formatting
        const formattedTopic = topic.charAt(0).toUpperCase() + topic.slice(1);

        // Inject Data
        document.getElementById("resTopic").innerText = formattedTopic;
        document.getElementById("resTitle").innerText = tpl.title.replace(/{topic}/g, formattedTopic);
        document.getElementById("resHook").innerText = `"${tpl.hook.replace(/{topic}/g, formattedTopic)}"`;
        
        // Build Outline HTML
        const outlineHTML = tpl.outline.map(item => `
            <div class="flex items-start gap-3 p-2 rounded-lg hover:bg-slate-800 transition-colors">
                <div class="mt-1 w-2 h-2 rounded-full bg-cyan-500 shrink-0 shadow-[0_0_8px_rgba(6,182,212,0.8)]"></div>
                <p class="text-slate-300">${item.replace(/{topic}/g, formattedTopic)}</p>
            </div>
        `).join('');
        document.getElementById("resOutline").innerHTML = outlineHTML;

        // Thumbnail
        let shortTopic = formattedTopic.length > 12 ? formattedTopic.substring(0, 12) + '...' : formattedTopic;
        document.getElementById("resThumbText").innerText = tpl.thumbText.replace(/{topic}/g, shortTopic.toUpperCase());
        document.getElementById("resThumbDesc").innerText = tpl.thumbDesc.replace(/{topic}/g, formattedTopic);
    }
</script>

</body>
</html>
