<!-- JAVASCRIPT -->

<script>

function startScan(){

let topic=document.getElementById("topic").value;

if(!topic){
topic="AI"
}

let growth=Math.floor(Math.random()*500)+50;
let score=Math.floor(Math.random()*60)+40;

document.getElementById("resTopic").innerText="Topic: "+topic;

document.getElementById("growth").innerText=growth;

document.getElementById("score").innerText=score;

document.getElementById("result").style.display="block";

}

</script>
