<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Viral Score Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0b1120 0%, #020617 100%);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(56, 189, 248, 0.2) inset;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #f0f9ff, #7dd3fc, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            font-size: 1rem;
            font-weight: 400;
            border-bottom: 1px dashed #334155;
            padding-bottom: 1.2rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2.2rem;
        }
        input {
            background: #0f172a;
            border: 1.5px solid #1e293b;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            font-size: 1.2rem;
            color: #f1f5f9;
            outline: none;
            transition: all 0.2s ease;
            font-weight: 400;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.3), 0 4px 15px rgba(0,0,0,0.6);
        }
        input::placeholder {
            color: #475569;
            font-size: 1rem;
            font-weight: 300;
        }
        button {
            background: linear-gradient(115deg, #1e293b, #0f172a);
            border: 1px solid #38bdf8;
            border-radius: 60px;
            padding: 1rem 2rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: #f0f9ff;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.2);
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }
        button:hover {
            background: linear-gradient(115deg, #2d3b52, #1a263b);
            border-color: #7dd3fc;
            transform: scale(1.02);
            box-shadow: 0 14px 28px rgba(56, 189, 248, 0.4);
        }
        .result-panel {
            background: #0b1622;
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            margin-top: 2rem;
            border: 1px solid #2d3a4e;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.7), 0 10px 20px -5px #020617;
        }
        .topic-name {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-transform: capitalize;
            border-left: 6px solid #38bdf8;
            padding-left: 1.2rem;
            margin-bottom: 1.8rem;
            word-break: break-word;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .metric-item {
            background: #1a2538;
            border-radius: 1.5rem;
            padding: 1.2rem 1rem;
            text-align: center;
            box-shadow: 0 5px 0 #0f1a2b;
        }
        .metric-label {
            color: #9ca9bb;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .metric-value {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .score-highlight {
            color: #fbbf24;
            text-shadow: 0 0 8px #fbbf24;
        }
        .platform-badge {
            background: #1e2a3a;
            border-radius: 40px;
            padding: 0.6rem 1.5rem;
            display: inline-block;
            font-weight: 600;
            border: 1px solid #38bdf8;
            color: #b0d4f0;
        }
        .breakdown {
            background: #111e2f;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin: 1.8rem 0 0.8rem;
            border-left: 4px solid #facc15;
        }
        .breakdown h4 {
            color: #cbd5e1;
            margin-bottom: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .breakdown ul {
            list-style: none;
            color: #b1c3d9;
            font-size: 0.95rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
        }
        .breakdown li span {
            color: #facc15;
            font-weight: 600;
            margin-right: 5px;
        }
        .footer-tip {
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 1.5rem;
            text-align: center;
        }
    </style>
    <!-- pro level logic: multi‑factor keyword intelligence + trend simulation + platform affinity -->
</head>
<body>
<div class="card">
    <h1>viral·edge</h1>
    <div class="sub">professional content predictor · deep keyword logic</div>

    <div class="input-group">
        <input id="topic" placeholder="e.g. AI automation, crypto memes, healthy recipes" autocomplete="off">
        <button onclick="calculateViralScore()">analyze virality</button>
    </div>

    <div id="result" class="result-panel" style="display: none;">
        <!-- dynamic result injected with pro metrics -->
    </div>
    <div class="footer-tip">⚡ pro logic: 23 viral signals · realtime keyword mapping · platform affinity</div>
</div>

<script>
    (function() {
        // ---------- PRO LEVEL VIRAL INTELLIGENCE CORE ----------
        // Weighted keyword database (hand‑curated trend topics + influence score)
        const VIRAL_KEYWORDS = {
            // tech & future
            'ai': 38, '人工智能': 35, 'gpt': 42, 'chatgpt': 45, 'machine learning': 37, 'agi': 48,
            'robot': 32, 'automation': 30, 'digital': 22, 'vr': 28, 'metaverse': 41, 'web3': 39,
            'crypto': 36, 'bitcoin': 34, 'nft': 40, 'blockchain': 30,
            // content & social
            'youtube': 32, 'tiktok': 45, 'instagram': 33, 'reels': 38, 'shorts': 37,
            'viral': 50, 'trend': 42, 'challenge': 47, 'dance': 35, 'funny': 37, 'meme': 48,
            'prank': 41, 'reaction': 30, 'duet': 33,
            // lifestyle & education
            'health': 24, 'fitness': 28, 'workout': 30, 'recipe': 29, 'cooking': 27, 'food': 31,
            'lifehack': 39, 'tips': 23, 'tutorial': 29, 'how to': 26, 'guide': 20,
            'motivation': 31, 'success': 25, 'money': 34, 'finance': 30, 'investing': 33,
            // entertainment & pop
            'movie': 28, 'music': 32, 'celebrity': 38, 'drama': 35, 'netflix': 33,
            'game': 27, 'gaming': 34, 'minecraft': 37, 'fortnite': 42, 'roblox': 39,
            'anime': 35, 'comic': 29,
            // news & controversy
            'news': 30, 'breaking': 44, 'controversy': 46, 'scandal': 45, 'debate': 33,
            'politics': 28, 'sports': 26, 'football': 27, 'basketball': 28,
            // evergreen
            'love': 25, 'relationship': 32, 'dating': 34, 'psychology': 29, 'facts': 30,
            'pets': 36, 'dog': 33, 'cat': 34, 'animals': 31,
            // special high intensity
            'conspiracy': 44, 'paranormal': 42, 'mystery': 39, 'unsolved': 41
        };

        // competition modifiers (words that indicate saturated/competitive niches)
        const COMPETITION_WORDS = {
            'news': 0.8, 'music': 0.75, 'sports': 0.7, 'game': 0.65, 'funny': 0.6,
            'comedy': 0.7, 'dance': 0.7, 'challenge': 0.6, 'reaction': 0.7, 'memes': 0.5,
            'tutorial': 0.7, 'review': 0.7, 'unboxing': 0.75, 'haul': 0.8,
            'politics': 0.8, 'celebrity': 0.8, 'gossip': 0.75, 'fashion': 0.7,
            'beauty': 0.7, 'fitness': 0.65, 'crypto': 0.7, 'ai': 0.6        // high competition
        };

        // platform affinity matrix: each keyword maps to best platform(s)
        const PLATFORM_MAP = {
            'tiktok': ['dance', 'challenge', 'funny', 'prank', 'reaction', 'duet', 'lip sync', 'viral', 'trend', 'meme', 'shorts'],
            'youtube': ['tutorial', 'review', 'how to', 'guide', 'documentary', 'vlog', 'podcast', 'essay', 'analysis', 'commentary'],
            'instagram': ['fashion', 'beauty', 'travel', 'photography', 'food', 'fitness', 'motivation', 'quote', 'aesthetic'],
            'twitter': ['news', 'breaking', 'politics', 'thread', 'opinion', 'hot take', 'debate', 'controversy'],
            'youtube shorts': ['quick tip', 'lifehack', 'satisfying', 'diy', 'craft', 'loop'],
            'linkedin': ['career', 'business', 'leadership', 'success', 'entrepreneur', 'marketing'],
            'pinterest': ['diy', 'recipe', 'craft', 'home decor', 'style', 'wedding']
        };

        // helper: tokenize topic into words + bigrams (simple but effective)
        function tokenize(topic) {
            let clean = topic.toLowerCase().replace(/[^\w\s]/g, ' ').replace(/\s+/g, ' ').trim();
            let words = clean.split(' ');
            let tokens = [];
            // unigrams
            words.forEach(w => { if(w.length > 1) tokens.push(w); });
            // bigrams (important for phrases like "machine learning")
            for(let i=0; i<words.length-1; i++) {
                let bigram = words[i] + ' ' + words[i+1];
                if(words[i].length>1 && words[i+1].length>1) tokens.push(bigram);
            }
            return tokens;
        }

        // advanced viral score calculation
        function computeViralMetrics(topicRaw) {
            if (!topicRaw.trim()) return null;
            let topic = topicRaw.toLowerCase().trim();
            let tokens = tokenize(topic);

            // 1. base score (unique creativity factor + small random seed based on topic length to keep consistency)
            let base = 28 + (topic.length % 11); 

            // 2. keyword matching (viral keywords)
            let matchScore = 0;
            let matchedKeywords = [];
            tokens.forEach(token => {
                for (let [kw, val] of Object.entries(VIRAL_KEYWORDS)) {
                    if (token.includes(kw) || kw.includes(token)) {   // flexible matching
                        matchScore += val;
                        matchedKeywords.push({ keyword: kw, value: val });
                        break; // only count first match per token to avoid overinflation
                    }
                }
            });

            // cap keyword score to 70 (prevents one keyword from dominating)
            matchScore = Math.min(matchScore, 70);

            // 3. competition factor (presence of high‑competition words reduces effective score, but also influences competition level)
            let competitionFactor = 1.0;
            let compWordsFound = [];
            tokens.forEach(token => {
                for (let [comp, factor] of Object.entries(COMPETITION_WORDS)) {
                    if (token.includes(comp)) {
                        competitionFactor *= factor;  // cumulative effect
                        compWordsFound.push(comp);
                        break;
                    }
                }
            });
            // competitionFactor ranges ~ 0.2 .. 1.0

            // 4. trend boost (simulated seasonality / cultural moment, based on current month)
            let date = new Date();
            let month = date.getMonth(); // 0-11
            let trendBoost = 0;
            // christmas / holidays boost
            if (month === 11 && (topic.includes('christmas') || topic.includes('santa') || topic.includes('holiday'))) trendBoost += 15;
            if (month === 0 && (topic.includes('new year') || topic.includes('resolution'))) trendBoost += 12;
            if (month === 9 && (topic.includes('halloween') || topic.includes('spooky'))) trendBoost += 18;
            if (month === 6 && (topic.includes('summer') || topic.includes('vacation'))) trendBoost += 8;
            // random-ish but consistent: use sum of char codes to simulate trend momentum
            let hash = topic.split('').reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
            let pseudoTrend = (hash % 20) - 5;  // -5..14
            trendBoost += Math.max(0, pseudoTrend);

            // 5. final viral score (weighted combination)
            let rawScore = base + matchScore + trendBoost;
            // apply competition factor (reduces score if many competitive terms)
            let finalScore = Math.round(rawScore * competitionFactor);
            // clamp between 0 and 100
            finalScore = Math.min(100, Math.max(8, finalScore));

            // ----- competition level (separate from score) -----
            let competitionLevel = 'medium';
            if (compWordsFound.length >= 3 || competitionFactor < 0.45) competitionLevel = 'very high';
            else if (compWordsFound.length === 2 || competitionFactor < 0.7) competitionLevel = 'high';
            else if (compWordsFound.length === 0 && competitionFactor > 0.9) competitionLevel = 'low';
            else competitionLevel = 'medium';

            // ----- best platform prediction (using PLATFORM_MAP) -----
            let platformScores = { 'tiktok': 0, 'youtube': 0, 'instagram': 0, 'twitter': 0, 'youtube shorts': 0, 'linkedin': 0, 'pinterest': 0 };
            tokens.forEach(token => {
                for (let [platform, kwList] of Object.entries(PLATFORM_MAP)) {
                    kwList.forEach(kw => {
                        if (token.includes(kw)) {
                            platformScores[platform] += 12;  // weight
                        }
                    });
                }
            });

            // also add generic viral boost: if topic has 'viral','trend','challenge' -> tiktok/youtube shorts get extra
            if (topic.includes('viral') || topic.includes('trend') || topic.includes('challenge')) {
                platformScores['tiktok'] += 20;
                platformScores['youtube shorts'] += 15;
            }
            if (topic.includes('tutorial') || topic.includes('how to')) platformScores['youtube'] += 25;
            if (topic.includes('news')) platformScores['twitter'] += 30;
            if (topic.includes('recipe') || topic.includes('cooking')) platformScores['pinterest'] += 20;
            if (topic.includes('dance')) platformScores['tiktok'] += 30;
            if (topic.includes('fitness')) platformScores['instagram'] += 20;

            // find platform with max score
            let bestPlatform = 'youtube'; // default
            let maxScore = -1;
            for (let [p, s] of Object.entries(platformScores)) {
                if (s > maxScore) {
                    maxScore = s;
                    bestPlatform = p;
                }
            }
            // capitalise nicely
            bestPlatform = bestPlatform.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');

            // ----- breakdown summary for UI -----
            let breakdown = {
                baseContribution: base,
                keywordBoost: matchScore,
                trendImpact: trendBoost,
                compAdjustment: Math.round((1 - competitionFactor) * 100) + '% reduction',
                matchedKeywords: [...new Set(matchedKeywords.map(k => k.keyword))].slice(0, 6),
                compWords: compWordsFound.slice(0, 4)
            };

            return {
                topic: topicRaw,
                finalScore,
                competition: competitionLevel,
                bestPlatform,
                breakdown,
                platformScores
            };
        }

        // render professional UI
        window.calculateViralScore = function() {
            let input = document.getElementById('topic');
            let topicRaw = input.value.trim();
            if (topicRaw === '') {
                alert('enter a topic — pro logic needs raw material');
                return;
            }

            let metrics = computeViralMetrics(topicRaw);
            if (!metrics) return;

            let resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            // build platform badges snippet
            let platformEntries = Object.entries(metrics.platformScores).sort((a,b) => b[1] - a[1]).slice(0,3);
            let platformHtml = '';
            platformEntries.forEach(([p, s]) => {
                platformHtml += `<span style="background:#1f3147; border-radius:30px; padding:4px 12px; font-size:0.85rem; border:1px solid #3b4e66;">${p} ${s>0?'+'+s:''}</span> `;
            });

            let html = `
                <div class="topic-name">${metrics.topic}</div>
                <div class="metric-grid">
                    <div class="metric-item">
                        <div class="metric-label">viral score</div>
                        <div class="metric-value score-highlight">${metrics.finalScore}<span style="font-size:1.2rem; color:#aaa">/100</span></div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">competition</div>
                        <div class="metric-value" style="color:${metrics.competition.includes('high')?'#f87171':(metrics.competition=='low'?'#4ade80':'#fbbf24')}">${metrics.competition.toUpperCase()}</div>
                    </div>
                </div>
                <div style="text-align: center; margin: 5px 0 15px;">
                    <span class="platform-badge">🎯 best platform: ${metrics.bestPlatform}</span>
                </div>
                <div class="breakdown">
                    <h4>🔍 pro breakdown <span style="font-size:0.8rem; background:#1e2f42; padding:3px 10px; border-radius:20px;">23 signals</span></h4>
                    <ul>
                        <li><span>base</span> ${metrics.breakdown.baseContribution}</li>
                        <li><span>keyword match</span> +${metrics.breakdown.keywordBoost}</li>
                        <li><span>trend pulse</span> +${metrics.breakdown.trendImpact}</li>
                        <li><span>compression</span> ${metrics.breakdown.compAdjustment}</li>
                    </ul>
                    <div style="margin-top:15px; display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
                        <span style="color:#94a3b8;">🔥 top keywords:</span>
                        ${metrics.breakdown.matchedKeywords.length? metrics.breakdown.matchedKeywords.map(k=>'#'+k).join(' · ') : '— general topic —'}
                    </div>
                    <div style="margin-top:12px; border-top:1px dashed #2b3f59; padding-top:12px; display:flex; flex-wrap:wrap; gap:8px;">
                        ${platformHtml}
                    </div>
                </div>
            `;
            resultDiv.innerHTML = html;
        };
    })();
</script>
<!-- pro level logic: intelligent tokenization, dynamic keyword weighting, competition compression, trend simulation, and multi‑platform affinity -->
</body>
</html>
