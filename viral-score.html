<!DOCTYPE html>
<html>

<head>

<title>Viral Score Tool</title>

</head>

<body style="background:#020617;color:white;font-family:sans-serif;text-align:center;padding:40px">

<h1>Viral Score Checker</h1>

<input id="topic" placeholder="Enter topic" style="padding:10px;width:250px">

<br><br>

<button onclick="checkViral()" style="padding:10px 20px">Check Viral Score</button>

<div id="result" style="margin-top:30px"></div>


<script>

function checkViral(){

let topic=document.getElementById("topic").value.toLowerCase()

let score=30

if(topic.includes("ai")) score+=40
if(topic.includes("youtube")) score+=20
if(topic.includes("automation")) score+=20

let competition="Medium"

if(score>70) competition="Low"
if(score<40) competition="High"

let platform="YouTube"

if(score>85) platform="TikTok"
if(score>75) platform="YouTube Shorts"

document.getElementById("result").innerHTML=`

<h2>${topic}</h2>

<p>Viral Score: ${score}/100</p>

<p>Competition: ${competition}</p>

<p>Best Platform: ${platform}</p>

`

}

</script>

</body>

</html>
